databases:
  - name: lifepass-db
    databaseName: lifepass
    user: lifepass
    plan: free

services:
  - type: web
    name: lifepass-api
    runtime: node
    rootDir: services/api
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: STARTUP_STRICT
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: lifepass-db
          property: connectionString
      - key: API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CORS_ALLOW_CREDENTIALS
        value: "0"
      - key: RPC_URL
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: SBT_CONTRACT_ADDRESS
        sync: false
      - key: TRUST_REGISTRY_ADDRESS
        sync: false
      - key: AGE_VERIFIER_ADDRESS
        sync: false
      - key: LIFEPASS_SSO_JWT_SECRET
        sync: false
      - key: LIFEPASS_SSO_JWT_ISSUER
        value: lifepass-api
      - key: LIFEPASS_SSO_DEFAULT_AUDIENCE
        value: zionstack-portals
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: lifepass-assets
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
