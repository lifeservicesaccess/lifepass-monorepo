name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      USE_SNARKJS: ${{ vars.USE_SNARKJS || '0' }}
      SNARK_WASM_PATH: ${{ vars.SNARK_WASM_PATH || '' }}
      SNARK_ZKEY_PATH: ${{ vars.SNARK_ZKEY_PATH || '' }}
      SNARK_VKEY_PATH: ${{ vars.SNARK_VKEY_PATH || '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate blueprint deployment contract
        run: node ./scripts/validate_deployment_contract.js
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install API dependencies
        working-directory: services/api
        run: npm ci
      - name: Install dependencies
        run: |
          cd apps/web && npm install
      - name: Lint API and frontend
        run: |
          cd services/api && npx eslint . --max-warnings=0
          cd ../../apps/web && npx eslint . --max-warnings=0
      - name: Run API tests
        working-directory: services/api
        run: |
          npm run check:schema
          npm test
      - name: Run policy admin governance regression tests
        working-directory: services/api
        run: node --test --test-concurrency=1 ./tests/policyAdminGovernance.http.test.js
      - name: Run agent python tests
        run: python -m unittest discover -s agents/tests -p "test_*.py"
      - name: Validate SNARK artifacts (optional)
        if: env.USE_SNARKJS == '1'
        working-directory: services/api
        run: npm run validate:snark
      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Compile and test contracts
        run: |
          cd contracts
          forge build
          forge test
      - name: Build web app
        run: |
          cd apps/web && npm run build

  deploy-web-vercel:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.VERCEL_ENABLED == '1'
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Verify Vercel admin session secret
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          temp_env_file="$(mktemp)"
          trap 'rm -f "$temp_env_file"' EXIT

          cd apps/web
          vercel env pull "$temp_env_file" --environment=production --yes --token="$VERCEL_TOKEN" >/dev/null
          node ../../scripts/validate_deployment_contract.js --skip-render --skip-railway --skip-web-env-example --web-env "$temp_env_file" --web-env-label "Vercel production environment"
      - name: Deploy web to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          cd apps/web
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

  zk-mode-smoke:
    if: vars.USE_SNARKJS == '1'
    needs: build-and-test
    runs-on: ubuntu-latest
    env:
      USE_SNARKJS: ${{ vars.USE_SNARKJS }}
      SNARK_WASM_PATH: ${{ vars.SNARK_WASM_PATH || '' }}
      SNARK_ZKEY_PATH: ${{ vars.SNARK_ZKEY_PATH || '' }}
      SNARK_VKEY_PATH: ${{ vars.SNARK_VKEY_PATH || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install API dependencies
        working-directory: services/api
        run: npm ci
      - name: Validate SNARK artifacts
        working-directory: services/api
        run: npm run validate:snark
      - name: Run SNARK-enabled simulated smoke
        shell: pwsh
        run: |
          ./scripts/testnet-smoke.ps1 -Mode simulated -SkipApply