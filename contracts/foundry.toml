[profile.default]
src = "."
test = "test"
out = "out"
cache_path = "cache"
libs = ["../services/api/node_modules", "lib"]

remappings = [
  "@openzeppelin/contracts-upgradeable/=../services/api/node_modules/@openzeppelin/contracts-upgradeable/"
]

solc_version = "0.8.19"
optimizer = true
optimizer_runs = 200
